    - mcp
    kubeVersion: '>= 1.31.0'
    maintainers:
    - name: Chris Lee
      url: https://github.com/chrisleekr
    name: github-app-playground
    sources:
    - https://github.com/chrisleekr/github-app-playground
    type: application
    urls:
    - https://github.com/chrisleekr/helm-charts/releases/download/github-app-playground-0.15.2/github-app-playground-0.15.2.tgz
    version: 0.15.2
  - annotations:
      artifacthub.io/changes: |
        - kind: fixed
          description: "Bumped appVersion to 1.12.1. Restores per-line inline review comments on PRs by resolving `github_comment` and `github_inline_comment` MCP server scripts via `import.meta.url` so the SDK can spawn them from the cloned-repo workDir, and disallows `ToolSearch` so the model trusts the eager tool list (upstream #123). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: added
          description: "Bumped appVersion to 1.12.0. Exposes 5 new optional config keys mirroring src/config.ts: `config.triageToolsEnabled` (group 10, kill-switch for tool-driven triage classifier) and group 10a chat-thread executor tunables (`config.chatThreadExecuteThreshold`, `config.chatThreadProposalTtlHours`, `config.chatThreadMaxTurns`, `config.chatThreadToolsEnabled`)."
        - kind: added
          description: "Tool-driven LLM with a new in-process `github-state` MCP server (upstream #117/#118): triage and chat-thread agents now fetch fresh PR state on demand instead of relying on a snapshot. Internal architecture only — no chart values, env vars, or template surface changes."
        - kind: added
          description: "Chat-thread executor (upstream #113): conversational scoped intent path with structured-output chokepoint and OAuth gate fix. Default ON via the new `config.chatThread*` tunables."
        - kind: added
          description: "Defense layer 5 (upstream #121): hardens bot against prompt-injection comment attacks. Adds Unicode TAG-block stripping, nonced spotlight tags, and routes every remaining Phase-2 GitHub write path through `safePostToGitHub`. Internal hardening only — no chart values or template surface changes."
        - kind: fixed
          description: "Bumped appVersion to 1.12.0. Sanitizes attacker-controlled filenames in `formatChangedFiles` (upstream #110). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: fixed
          description: "Bumped appVersion to 1.12.0. Reroutes iteration-0 terminal-bad ship verdicts to chat-thread (upstream #119/#120). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: fixed
          description: "Bumped appVersion to 1.11.1. Tracking-mirror setState is now idempotent via embedded run markers and orphan adoption, eliminating duplicate tracking comments caused by octokit retry on transient 5xx (upstream #109/#111). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: added
          description: "Bumped appVersion to 1.11.0. Resolve workflow now gates handler success on post-fix CI state (upstream #107). Internal logic only — no chart values, env vars, or template surface changes."
        - kind: fixed
          description: "Bumped appVersion to 1.11.0. Implement workflow now matches PR author by login in PAT mode (upstream #108). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: fixed
          description: "Bumped appVersion to 1.10.2. Executor drops the `CLAUDE_CODE_SUBPROCESS_ENV_SCRUB` flag that was blocking Claude CLI startup (upstream #106). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: fixed
          description: "Bumped appVersion to 1.10.1. Executor now captures Claude CLI stderr via SDK callback so failures surface in logs instead of being swallowed (upstream #105). Internal fix only — no chart values, env vars, or template surface changes."
        - kind: added
          description: "Bumped appVersion to 1.10.0. Exposes 5 new optional env vars mirroring src/config.ts: `secrets.githubPersonalAccessToken` (group 3, PAT override — single-tenant only, app hard-fails unless `config.allowedOwners` has exactly one owner), `secrets.daemonAuthTokenPrevious` (group 8, rotation-window predecessor for orchestrator-side daemon Bearer auth), and group 10b LLM output-scanner tunables (`config.llmOutputScannerEnabled`, `config.llmOutputScannerModel`, `config.llmOutputScannerTimeoutMs`)."
        - kind: added
          description: "Defense layer 4: optional second-pass LLM scan on every agent-generated body before posting to GitHub, catching encoded/obfuscated secrets the regex pass misses (upstream #104). Default ON, fail-open on outage."
        - kind: added
          description: "Optional `GITHUB_PERSONAL_ACCESS_TOKEN` override of GitHub App installation token; commit author/committer metadata still pinned to `chrisleekr-bot[bot]` (upstream #104)."
        - kind: added
          description: "Rolling-rotation support for `DAEMON_AUTH_TOKEN`: orchestrator accepts EITHER the primary or `DAEMON_AUTH_TOKEN_PREVIOUS` (constant-time) until the rotation window closes (upstream #103)."
        - kind: changed
          description: "Orchestrator bearer-token check is now constant-time across all branches (upstream #76, #103)."
        - kind: changed
          description: "Default `config.triageModel` flipped from `haiku-4-5` to `sonnet-4-6` to align with upstream's new Zod default. Operators pinning to a Haiku alias for cost reasons must now set `config.triageModel` explicitly."
