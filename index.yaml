      on PRs and issues, using Claude Agent SDK with MCP servers for GitHub interactions.
    digest: c5a12706e5d42c4b23f3250bb3ea430b2e2f5f28c9e8f1da99f51597f08469fe
    home: https://github.com/chrisleekr/github-app-playground
    keywords:
    - github-app
    - claude
    - ai
    - bot
