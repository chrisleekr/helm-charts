# Default values for github-app-playground.
# This is a YAML-formatted file. Declare variables to be passed into your templates.
#
# Commenting rule: every non-obvious parameter has one short line that names the
# trigger condition (when to set, when to leave default). No narrative.

# ─────────────────────────── INFRASTRUCTURE ───────────────────────────

replicaCount: 1

image:
  repository: chrisleekr/github-app-playground
  pullPolicy: IfNotPresent
  tag: ""                                       # Leave empty to use .Chart.AppVersion.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Auto-mount the SA token so src/k8s/job-spawner.ts can call the Kubernetes API
  # when config.agentJobMode is isolated-job or auto. Safe to leave true when RBAC
  # is disabled: the token still grants nothing without a Role binding.
  automount: true
  annotations: {}                               # Add IRSA / cloud IAM bindings here.
  name: ""                                      # Leave empty to use the fullname template.

# Role + RoleBinding for in-cluster Job spawning (isolated-job mode).
rbac:
  create: false                                 # Set true when config.agentJobMode is isolated-job or auto.

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsNonRoot: true

securityContext:
  capabilities:
    drop:
      - ALL
  # Must be false: the Node.js runtime writes outside the workspace PVC (npm cache, OS tmp).
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local                 # Replace with your real host in the consumer values file.
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Resource recommendations scale with config.maxConcurrentRequests (~512Mi per session).
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# Autoscaling is unsafe when workspaces are bound to a single pod (default). Enable
# only with a ReadWriteMany workspace PVC.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Must be >= app shutdown timeout (290s).
terminationGracePeriodSeconds: 300

# Workspace PVC for transient repo clones (CLONE_BASE_DIR).
workspace:
  persistence:
    enabled: true                               # Set false for ephemeral (tests only).
    storageClass: ""                            # Leave empty for cluster default StorageClass.
    # storageClass: "-"                         # Set to "-" to disable dynamic provisioning.
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    existingClaim: ""                           # Set to reuse a pre-existing PVC.

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}

# Extra env vars appended to the webhook container. Use for ad-hoc cases that don't fit `config:`.
extraEnv: []
# - name: HTTP_PROXY
#   value: http://proxy.example.com:3128

# ─── In-chart stateful deps (each supports in-cluster or external) ───

postgres:
  enabled: false                                # Set true to provision Postgres in-cluster.
  # Use an existing Postgres instead of provisioning one. Do not combine with postgres.enabled.
  external:
    enabled: false
    host: ""                                    # Required when external.enabled is true.
    port: 5432
    username: ""                                # Required when external.enabled is true.
    database: ""                                # Required when external.enabled is true.
    sslmode: disable                            # disable | require | verify-full.
    existingSecret: ""                          # Preferred over external.password. Secret in release namespace.
    existingSecretPasswordKey: POSTGRES_PASSWORD
    password: ""                                # Use only if existingSecret is empty. Avoid checking in.
  image:
    repository: pgvector/pgvector
    tag: pg17                                   # Pin only when changing Postgres major.
    pullPolicy: IfNotPresent
  auth:
    existingSecret: ""                          # Set to skip chart-managed password Secret. Must contain POSTGRES_PASSWORD.
    username: github_app
    database: github_app
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true                               # Set false only for ephemeral tests.
    existingClaim: ""                           # Set to reuse a pre-existing PVC.
    accessModes: [ReadWriteOnce]
    size: 5Gi
    storageClass: ""                            # Leave empty for cluster default.
    # storageClass: "-"                         # Set to "-" to disable dynamic provisioning.
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  podSecurityContext:
    fsGroup: 999
    runAsUser: 999
    runAsNonRoot: true
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

valkey:
  enabled: false                                # Set true to provision Valkey in-cluster.
  external:
    enabled: false                              # Set true to use an existing Valkey. Do not combine with valkey.enabled.
    host: ""                                    # Required when external.enabled is true.
    port: 6379
    database: 0
    auth:
      enabled: true                             # Set false only when the external Valkey has no auth.
      existingSecret: ""                        # Preferred over external.auth.password.
      existingSecretPasswordKey: VALKEY_PASSWORD
      password: ""                              # Use only if existingSecret is empty. Avoid checking in.
  # Must stay at 1 while persistence.enabled is true. Every replica would mount
  # the same RWO PVC, which either fails scheduling (2nd pod Pending on the
  # volume lock) or corrupts data. Switch to StatefulSet + volumeClaimTemplates
  # if you need multi-replica Valkey.
  replicaCount: 1
  image:
    repository: valkey/valkey
    tag: "8-alpine"
    pullPolicy: IfNotPresent
  auth:
    enabled: true                               # Set false only for local/no-auth tests.
    password: ""                                # Leave empty to auto-generate and persist.
    existingSecret: ""                          # Set to skip chart-managed password Secret.
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    storageClass: ""                            # Leave empty for cluster default.
    # storageClass: "-"                         # Set to "-" to disable dynamic provisioning.
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 100Mi
  podSecurityContext:
    fsGroup: 999
    runAsUser: 999
    runAsNonRoot: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    # Valkey writes RDB/AOF snapshots under /data; cannot be read-only.
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# Optional extra Deployment running the same image as the webhook, in
# "shared runner" mode. Keep disabled until the app registers POST /internal/run.
sharedRunner:
  enabled: false
  replicaCount: 1
  image: {}                                     # Leave empty to inherit .Values.image.
  service:
    type: ClusterIP
    port: 7081
  resources: {}                                 # Set per environment; no default.
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─────────────────────────── APPLICATION SECRETS ──────────────────────
# `secrets:` holds every credential / token that is sensitive. These fields
# are rendered into the chart-managed Kubernetes Secret and injected via
# `envFrom: secretRef`. Section numbers mirror the groups in the app's
# `src/config.ts` Zod schema (same ordering as `config:` below).
#
# NEVER commit real values here. Either:
#   1) supply them via an out-of-repo, gitignored values file
#      (`helm install ... --values secrets.yaml`), OR
#   2) set `secrets.existingSecret` to the name of a pre-existing Secret
#      managed by Sealed Secrets / External Secrets / SOPS / Vault.
secrets:
  # Chart escape hatch. When set, the chart-managed Secret is NOT rendered
  # and the Deployment consumes the named Secret directly. All-or-nothing:
  # the named Secret must contain every key the app expects (see secret.yaml).
  existingSecret: ""

  # --- 1. GitHub App credentials (server mode) ---
  appId: ""                                     # Required in server mode (orchestratorUrl unset).
  privateKey: ""                                # PEM contents, not a file path.
  webhookSecret: ""

  # --- 3. Anthropic direct-API credentials ---
  anthropicApiKey: ""                           # Required when config.provider=anthropic and claudeCodeOauthToken is empty.
  claudeCodeOauthToken: ""                      # Alternative to anthropicApiKey. Requires config.allowedOwners.

  # --- 4. AWS Bedrock credentials (secret subset) ---
  awsAccessKeyId: ""                            # Set for static AWS creds; otherwise leave empty.
  awsSecretAccessKey: ""
  awsSessionToken: ""                           # Set for temporary AWS STS creds.
  awsBearerTokenBedrock: ""                     # Set to use Bedrock bearer-token auth (GitHub Actions OIDC).

  # --- 5. App runtime / behaviour (secret subset) ---
  context7ApiKey: ""                            # Lifts the Context7 MCP rate limit. Unset works.

  # --- 8. Shared-runner HTTP target (auto-generated, persisted across upgrades) ---
  internalRunnerToken: ""                       # Leave empty to auto-generate and persist.
  sharedRunnerToken: ""                         # ADR-011 reserved; leave empty to auto-generate.

  # --- 9. Data layer (connection strings embed passwords → secret, not config) ---
  databaseUrl: ""                               # Leave empty to compose from postgres.* or postgres.external.*.
  valkeyUrl: ""                                 # Leave empty to compose from valkey.* or valkey.external.*.

  # --- 11. Daemon / Orchestrator WebSocket (auto-generated, persisted across upgrades) ---
  daemonAuthToken: ""                           # Leave empty to auto-generate and persist.

# ─────────────────────────── APPLICATION CONFIG ───────────────────────
# `config:` is a 1:1 mirror of the non-secret fields of the Zod schema in
# the app image's `src/config.ts`. Field names and group order match the
# numbered sections of that schema. Every key here is rendered into the
# chart-managed ConfigMap. Credentials live in `secrets:` above.
config:
  # --- 2. AI provider selection ---
  provider: anthropic                           # anthropic | bedrock.
  model: ""                                     # Required when provider=bedrock.

  # --- 4. AWS Bedrock credentials (non-secret subset) ---
  awsRegion: ""                                 # Required when provider=bedrock.
  awsProfile: ""                                # Set only for local SSO (e.g. after `aws sso login`).
  anthropicBedrockBaseUrl: ""                   # Override only to front Bedrock with a VPC endpoint / proxy.

  # --- 5. App runtime / behaviour ---
  cloneBaseDir: /tmp/bot-workspaces             # Must match workspace.persistence mount path.
  cloneDepth: 50                                # Git shallow-clone depth.
  triggerPhrase: "@chrisleekr-bot"              # Must match the GitHub App's bot login exactly.
  port: 3000                                    # Must match the container/service ports.
  logLevel: info                                # fatal | error | warn | info | debug | trace.
  nodeEnv: production
  maxConcurrentRequests: 3
  agentTimeoutMs: 600000
  agentMaxTurns: ""                             # Leave empty to use defaultMaxTurns or triage-derived turns.
  claudeCodePath: ""                            # Required only when claude-code is installed globally (e.g. Docker).
  allowedOwners: ""                             # Comma-separated. Required when secrets.claudeCodeOauthToken is set.

  # --- 6. Dispatch mode (Phase 2+ / Phase 3) ---
  agentJobMode: inline                          # inline | daemon | shared-runner | isolated-job | auto.
  defaultDispatchTarget: shared-runner          # Cannot be inline when agentJobMode=auto.

  # --- 7. K8s Job spawner (isolated-job target) ---
  jobNamespace: ""                              # Leave empty to use the release namespace.
  jobImage: ""                                  # Leave empty to inherit .Values.image.
  jobTtlSeconds: 300
  jobActiveDeadlineSeconds: 1800                # Zod caps at 3500 (installation-token TTL margin).
  jobWatchPollIntervalMs: 5000

  # --- 8. Shared-runner HTTP target (non-secret subset) ---
  internalRunnerUrl: ""                         # Required when agentJobMode is shared-runner or auto.

  # --- 10. Orchestrator ---
  wsPort: 3002                                  # Must differ from config.port.
  jobMaxCostUsd: 80                             # Placeholder today (not enforced in code).

  # --- 11. Daemon / Orchestrator WebSocket (non-secret subset) ---
  orchestratorUrl: ""                           # Setting this flips the process to DAEMON mode (webhook HTTP not started).
  heartbeatIntervalMs: 30000
  heartbeatTimeoutMs: 90000                     # Keep >= 2 x heartbeatIntervalMs.
  staleExecutionThresholdMs: 660000             # Must exceed agentTimeoutMs (600000).
  daemonDrainTimeoutMs: 600000                  # Set >= agentTimeoutMs to avoid mid-run kills on SIGTERM.
  jobMaxRetries: 3                              # Daemon-dispatch retry only. isolated-job ignores this (FR-021).
  offerTimeoutMs: 5000
  daemonUpdateStrategy: exit                    # exit | pull | notify.
  daemonUpdateDelayMs: 0
  daemonEphemeral: false                        # Placeholder today (not enforced in code).
  daemonMemoryFloorMb: 512
  daemonDiskFloorMb: 1024

  # --- 12. Triage pre-classifier (auto mode) ---
  triageEnabled: true                           # Kill-switch for the triage LLM call.
  triageModel: haiku-3-5
  triageConfidenceThreshold: 1.0                # Lower to 0.75 only after SC-003/SC-004 stabilise.
  triageMaxTokens: 256
  triageTimeoutMs: 5000

  # --- 13. Complexity → maxTurns mapping (FR-008a) ---
  triageMaxTurnsTrivial: 10
  triageMaxTurnsModerate: 30
  triageMaxTurnsComplex: 50
  defaultMaxTurns: 30

  # --- 14. Isolated-job capacity back-pressure (FR-018, US3) ---
  maxConcurrentIsolatedJobs: 3
  pendingIsolatedJobQueueMax: 20

# ─────────────────────────── DAEMON POOLS ─────────────────────────────
# `daemon:` configures 0..N stateless daemon worker pools. Each pool
# renders its own Deployment. Daemons connect outbound to the orchestrator
# WebSocket on :config.wsPort and register via a shared DAEMON_AUTH_TOKEN.
#
# The orchestrator's Service gains a `ws` port when any pool is defined
# (or when config.agentJobMode is non-inline), so daemons can reach it at
# ws://<fullname>:<config.wsPort>/ws.
#
# All pools share the same Docker image (default CMD overridden to daemon
# entry point) and the same app Secret (for DAEMON_AUTH_TOKEN and AI keys).
# Pool-level config keys override cross-pool `daemon.config` defaults.
daemon:
  orchestratorUrl: ""                  # empty → auto-computed ws://<fullname>:<wsPort>/ws
  terminationGracePeriodSeconds: ""    # empty → daemonDrainTimeoutMs/1000 + 30

  serviceAccount:
    name: ""                           # empty → inherits orchestrator SA

  # Daemon-runtime defaults sourced from github-app-playground/.env.example.
  # Each pool can override any key under its own `config:` block.
  config:
    heartbeatIntervalMs: 30000         # HEARTBEAT_INTERVAL_MS
    heartbeatTimeoutMs: 90000          # HEARTBEAT_TIMEOUT_MS (keep >= 2× interval)
    staleExecutionThresholdMs: 660000  # STALE_EXECUTION_THRESHOLD_MS; must exceed agentTimeoutMs (600000)
    daemonDrainTimeoutMs: 600000       # DAEMON_DRAIN_TIMEOUT_MS; must be >= agentTimeoutMs to avoid mid-run kills
    jobMaxRetries: 3                   # JOB_MAX_RETRIES
    offerTimeoutMs: 5000               # OFFER_TIMEOUT_MS
    daemonUpdateStrategy: exit         # exit | pull | notify
    daemonUpdateDelayMs: 0             # DAEMON_UPDATE_DELAY_MS
    daemonEphemeral: false             # DAEMON_EPHEMERAL
    daemonMemoryFloorMb: 512           # DAEMON_MEMORY_FLOOR_MB
    daemonDiskFloorMb: 1024            # DAEMON_DISK_FLOOR_MB

  # DinD sidecar defaults. Pools that set dind.enabled=true inherit any
  # omitted field from here. Rootless DinD is default and works under PSS
  # baseline. Classic DinD (rootless: false) requires privileged: true
  # and a permissive namespace PSA label.
  dind:
    enabled: false
    image:
      repository: docker
      tag: ""                          # empty → auto-selected: 29-dind-rootless (rootless=true) or 29-dind (rootless=false)
      pullPolicy: IfNotPresent
    rootless: true                     # false → privileged sidecar; auto-selects docker:29-dind image
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 4Gi
    storage:
      type: emptyDir                   # emptyDir | pvc
      sizeLimit: 10Gi                  # emptyDir sizeLimit only
      size: ""                         # pvc size (only when type: pvc)
      storageClass: ""
    extraEnv: []
    extraArgs: []                      # extra dockerd flags

  # Named pools. Each entry renders one Deployment.
  # Set enabled: false on a pool to stage it without rolling out.
  #
  # pools:
  #   default:
  #     replicaCount: 2
  #     resources:
  #       requests: { cpu: 250m, memory: 256Mi }
  #       limits:   { cpu: 1000m, memory: 1Gi }
  #     nodeSelector: {}
  #     tolerations: []
  #     affinity: {}
  #     podSecurityContext: {}
  #     securityContext: {}
  #     podAnnotations: {}
  #     podLabels: {}
  #     extraEnv: []
  #     volumes: []
  #     volumeMounts: []
  #     livenessProbe:
  #       enabled: false               # opt-in pgrep-based exec probe
  #     autoscaling:
  #       enabled: false
  #       minReplicas: 1
  #       maxReplicas: 5
  #       targetCPUUtilizationPercentage: 80
  #     podDisruptionBudget:
  #       enabled: false
  #       minAvailable: 1
  #     config: {}                     # overrides any key from daemon.config above
  #     dind:
  #       enabled: false               # set true to add a DinD sidecar
  #   docker-heavy:
  #     replicaCount: 1
  #     resources:
  #       requests: { cpu: 1000m, memory: 2Gi }
  #       limits:   { cpu: 4000m, memory: 8Gi }
  #     dind:
  #       enabled: true
  #       rootless: false              # privileged; requires permissive PSA namespace label
  #       storage: { type: pvc, size: 50Gi }
  pools: {}
