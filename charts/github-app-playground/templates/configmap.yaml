apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "github-app-playground.fullname" . }}-config
  labels:
    {{- include "github-app-playground.labels" . | nindent 4 }}
data:
  # Non-secret env vars. Each optional key is gated by `ne <val> ""` so empty
  # values become "not set" at the pod level and src/config.ts Zod applies
  # its own defaults or surfaces its own "required when X" errors.
  # Field order mirrors the numbered groups in src/config.ts.
  {{- $c := .Values.config }}

  # --- 2. AI provider selection ---
  CLAUDE_PROVIDER: {{ $c.provider | quote }}
  {{- if $c.model }}
  CLAUDE_MODEL: {{ $c.model | quote }}
  {{- end }}

  # --- 4. AWS Bedrock credentials (non-secret subset) ---
  {{- if $c.awsRegion }}
  AWS_REGION: {{ $c.awsRegion | quote }}
  {{- end }}
  {{- if $c.awsProfile }}
  AWS_PROFILE: {{ $c.awsProfile | quote }}
  {{- end }}
  {{- if $c.anthropicBedrockBaseUrl }}
  ANTHROPIC_BEDROCK_BASE_URL: {{ $c.anthropicBedrockBaseUrl | quote }}
  {{- end }}

  # --- 5. App runtime / behaviour ---
  CLONE_BASE_DIR: {{ $c.cloneBaseDir | quote }}
  CLONE_DEPTH: {{ $c.cloneDepth | quote }}
  TRIGGER_PHRASE: {{ $c.triggerPhrase | quote }}
  BOT_APP_LOGIN: {{ $c.botAppLogin | quote }}
  PORT: {{ $c.port | quote }}
  LOG_LEVEL: {{ $c.logLevel | quote }}
  NODE_ENV: {{ $c.nodeEnv | quote }}
  MAX_CONCURRENT_REQUESTS: {{ $c.maxConcurrentRequests | quote }}
  AGENT_TIMEOUT_MS: {{ int $c.agentTimeoutMs | quote }}
  {{- if ne ($c.agentMaxTurns | toString) "" }}
  AGENT_MAX_TURNS: {{ $c.agentMaxTurns | quote }}
  {{- end }}
  {{- if $c.claudeCodePath }}
  CLAUDE_CODE_PATH: {{ $c.claudeCodePath | quote }}
  {{- end }}
  {{- if $c.allowedOwners }}
  ALLOWED_OWNERS: {{ $c.allowedOwners | quote }}
  {{- end }}

  # --- 6. Orchestrator ---
  WS_PORT: {{ $c.wsPort | quote }}

  # --- 7. Daemon / Orchestrator WebSocket ---
  {{- if $c.orchestratorUrl }}
  {{- fail "config.orchestratorUrl must not be set on the orchestrator — presence of ORCHESTRATOR_URL flips it into daemon mode. Use daemon.orchestratorUrl or per-pool daemon.pools.<name>.orchestratorUrl instead." }}
  {{- end }}
  HEARTBEAT_INTERVAL_MS: {{ $c.heartbeatIntervalMs | quote }}
  HEARTBEAT_TIMEOUT_MS: {{ $c.heartbeatTimeoutMs | quote }}
  STALE_EXECUTION_THRESHOLD_MS: {{ int $c.staleExecutionThresholdMs | quote }}
  DAEMON_DRAIN_TIMEOUT_MS: {{ int $c.daemonDrainTimeoutMs | quote }}
  JOB_MAX_RETRIES: {{ $c.jobMaxRetries | quote }}
  OFFER_TIMEOUT_MS: {{ $c.offerTimeoutMs | quote }}
  QUEUE_WORKER_BACKOFF_MAX_MS: {{ int $c.queueWorkerBackoffMaxMs | quote }}
  LIVENESS_REAPER_INTERVAL_MS: {{ int $c.livenessReaperIntervalMs | quote }}
  DAEMON_UPDATE_STRATEGY: {{ $c.daemonUpdateStrategy | quote }}
  DAEMON_UPDATE_DELAY_MS: {{ $c.daemonUpdateDelayMs | quote }}
  DAEMON_MEMORY_FLOOR_MB: {{ $c.daemonMemoryFloorMb | quote }}
  DAEMON_DISK_FLOOR_MB: {{ $c.daemonDiskFloorMb | quote }}

  # --- 8. Ephemeral daemon (K8s-spawned scale-up) ---
  # The orchestrator itself is never ephemeral; only orchestrator-spawned Pods
  # set DAEMON_EPHEMERAL=true on their own container spec.
  DAEMON_EPHEMERAL: "false"
  EPHEMERAL_DAEMON_IDLE_TIMEOUT_MS: {{ $c.ephemeralDaemon.idleTimeoutMs | quote }}
  EPHEMERAL_DAEMON_SPAWN_COOLDOWN_MS: {{ $c.ephemeralDaemon.spawnCooldownMs | quote }}
  EPHEMERAL_DAEMON_SPAWN_QUEUE_THRESHOLD: {{ $c.ephemeralDaemon.spawnQueueThreshold | quote }}
  EPHEMERAL_DAEMON_NAMESPACE: {{ default .Release.Namespace $c.ephemeralDaemon.namespace | quote }}
  DAEMON_IMAGE: {{ default (include "github-app-playground.image.daemon" (dict "root" .)) $c.ephemeralDaemon.image | quote }}
  {{- if $c.ephemeralDaemon.orchestratorPublicUrl }}
  ORCHESTRATOR_PUBLIC_URL: {{ $c.ephemeralDaemon.orchestratorPublicUrl | quote }}
  {{- end }}

  # --- 9. Triage (binary heavy classifier) ---
  TRIAGE_ENABLED: {{ $c.triageEnabled | quote }}
  TRIAGE_MODEL: {{ $c.triageModel | quote }}
  TRIAGE_CONFIDENCE_THRESHOLD: {{ $c.triageConfidenceThreshold | quote }}
  TRIAGE_MAX_TOKENS: {{ $c.triageMaxTokens | quote }}
  TRIAGE_TIMEOUT_MS: {{ $c.triageTimeoutMs | quote }}
  INTENT_CONFIDENCE_THRESHOLD: {{ $c.intentConfidenceThreshold | quote }}

  # --- 10. Agent max turns ---
  {{- if ne ($c.defaultMaxTurns | toString) "" }}
  DEFAULT_MAXTURNS: {{ $c.defaultMaxTurns | quote }}
  {{- end }}

  # --- 12. Composite ship review/resolve loop ---
  {{- if ne ($c.reviewResolveMaxIterations | toString) "" }}
  REVIEW_RESOLVE_MAX_ITERATIONS: {{ $c.reviewResolveMaxIterations | quote }}
  {{- end }}

  # --- 13. Ship workflow (PR shepherding to merge-ready) ---
  MAX_WALL_CLOCK_PER_SHIP_RUN: {{ $c.maxWallClockPerShipRun | quote }}
  MAX_SHIP_ITERATIONS: {{ $c.maxShipIterations | quote }}
  CRON_TICKLE_INTERVAL_MS: {{ $c.cronTickleIntervalMs | quote }}
  MERGEABLE_NULL_BACKOFF_MS_LIST: {{ $c.mergeableNullBackoffMsList | quote }}
  REVIEW_BARRIER_SAFETY_MARGIN_MS: {{ int $c.reviewBarrierSafetyMarginMs | quote }}
  FIX_ATTEMPTS_PER_SIGNATURE_CAP: {{ $c.fixAttemptsPerSignatureCap | quote }}
  {{- if $c.shipForbiddenTargetBranches }}
  SHIP_FORBIDDEN_TARGET_BRANCHES: {{ $c.shipForbiddenTargetBranches | quote }}
  {{- end }}
