{{- if ne (int .Values.replicaCount) 1 }}
{{- fail "replicaCount must be exactly 1: OmniRoute persists to a single-writer SQLite database on the PVC. A second pod on the same claim would corrupt it." }}
{{- end }}
{{/* extraConfig overrides config (see values.yaml). Resolve once so containerPort
     and the data mount below stay aligned with what the ConfigMap actually sets. */}}
{{- $config := merge (deepCopy .Values.extraConfig) .Values.config }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omniroute.fullname" . }}
  labels:
    {{- include "omniroute.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # SQLite is a single-writer store. Recreate guarantees the old pod releases the
  # PVC before a new one mounts it; a RollingUpdate would briefly run two writers.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "omniroute.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "omniroute.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "omniroute.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Uses .Chart.AppVersion when image.tag is empty.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              # Derives from the app's real listen port (config.PORT) so an
              # override keeps the probe and Service targetPort chain aligned.
              containerPort: {{ $config.PORT | default .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "omniroute.fullname" . }}-config
            - secretRef:
                name: {{ include "omniroute.authSecretName" . }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ $config.DATA_DIR | default "/app/data" }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "omniroute.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
