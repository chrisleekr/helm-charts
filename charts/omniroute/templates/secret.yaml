{{- if not .Values.auth.existingSecret }}
{{- $name := printf "%s-auth" (include "omniroute.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $existingData := dict }}
{{- if $existing }}{{- $existingData = $existing.data }}{{- end }}
{{/* JWT_SECRET: explicit value > existing (persist) > generate */}}
{{- $jwt := "" }}
{{- if .Values.auth.jwtSecret }}
{{- $jwt = .Values.auth.jwtSecret | b64enc }}
{{- else if hasKey $existingData "JWT_SECRET" }}
{{- $jwt = index $existingData "JWT_SECRET" }}
{{- else }}
{{- $jwt = randAlphaNum 64 | b64enc }}
{{- end }}
{{/* API_KEY_SECRET: explicit value > existing (persist) > generate */}}
{{- $api := "" }}
{{- if .Values.auth.apiKeySecret }}
{{- $api = .Values.auth.apiKeySecret | b64enc }}
{{- else if hasKey $existingData "API_KEY_SECRET" }}
{{- $api = index $existingData "API_KEY_SECRET" }}
{{- else }}
{{- $api = randAlphaNum 64 | b64enc }}
{{- end }}
{{/* INITIAL_PASSWORD: explicit value > existing (persist) > required */}}
{{- $pw := "" }}
{{- if .Values.auth.initialPassword }}
{{- $pw = .Values.auth.initialPassword | b64enc }}
{{- else if hasKey $existingData "INITIAL_PASSWORD" }}
{{- $pw = index $existingData "INITIAL_PASSWORD" }}
{{- else }}
{{- $pw = required "auth.initialPassword is required when auth.existingSecret is empty. Set a strong initial dashboard password." .Values.auth.initialPassword | b64enc }}
{{- end }}
{{/* STORAGE_ENCRYPTION_KEY: explicit value > existing (persist) > empty (disabled) */}}
{{- $enc := "" }}
{{- if .Values.auth.storageEncryptionKey }}
{{- $enc = .Values.auth.storageEncryptionKey | b64enc }}
{{- else if hasKey $existingData "STORAGE_ENCRYPTION_KEY" }}
{{- $enc = index $existingData "STORAGE_ENCRYPTION_KEY" }}
{{- else }}
{{- $enc = "" | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "omniroute.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ $jwt | quote }}
  API_KEY_SECRET: {{ $api | quote }}
  INITIAL_PASSWORD: {{ $pw | quote }}
  STORAGE_ENCRYPTION_KEY: {{ $enc | quote }}
{{- end }}
