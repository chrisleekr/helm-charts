apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "omniroute.fullname" . }}-config
  labels:
    {{- include "omniroute.labels" . | nindent 4 }}
data:
  {{/* extraConfig wins over config (see values.yaml). Merge once so an
       overlapping key never renders as a duplicate YAML mapping key, which
       would fail at install/upgrade. deepCopy avoids mutating .Values in place. */}}
  {{- $config := merge (deepCopy .Values.extraConfig) .Values.config }}
  {{- range $key, $value := $config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{/* redis.url is a convenience alias for REDIS_URL; skip it if the key was
       already supplied via config/extraConfig, else it renders twice. */}}
  {{- if and .Values.redis.url (not (hasKey $config "REDIS_URL")) }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}
