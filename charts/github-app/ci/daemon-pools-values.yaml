postgres:
  enabled: true

valkey:
  enabled: true

daemon:
  pools:
    default:
      replicaCount: 2
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    docker-heavy:
      replicaCount: 1
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi
      dind:
        enabled: true
