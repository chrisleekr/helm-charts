{{- range $poolName, $pool := $.Values.daemon.pools }}
{{- if ne ($pool.enabled | toString) "false" }}
{{- $pdb := $pool.podDisruptionBudget | default dict }}
{{- if $pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "github-app.daemon.fullname" (dict "root" $ "poolName" $poolName) }}
  labels:
    {{- include "github-app.labels" $ | nindent 4 }}
    app.kubernetes.io/component: daemon
    app.kubernetes.io/pool: {{ $poolName }}
spec:
  {{- if hasKey $pdb "maxUnavailable" }}
  maxUnavailable: {{ $pdb.maxUnavailable }}
  {{- else if hasKey $pdb "minAvailable" }}
  minAvailable: {{ $pdb.minAvailable }}
  {{- else }}
  minAvailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "github-app.daemon.selectorLabels" (dict "root" $ "poolName" $poolName) | nindent 6 }}
{{- end }}
{{- end }}
{{- end }}
