{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "github-app.fullname" . }}-valkey
  labels:
    {{- include "github-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: {{ .Values.valkey.service.type }}
  ports:
    - port: {{ .Values.valkey.service.port }}
      targetPort: valkey
      protocol: TCP
      name: valkey
  selector:
    {{- include "github-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
{{- end }}
