# omniroute Jobs
test-omniroute-helm:
  stage: testing
  image: alpine/helm:3.20.0
  interruptible: true
  rules:
    - changes:
        - charts/omniroute/**/*
  script:
    # ct-values supplies the required auth.initialPassword for rendering.
    - helm lint ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml > ./template-omniroute.yaml
    # Render each conditional branch so a template error in any is caught in CI.
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml --set ingress.enabled=true --set ingress.className=nginx > /dev/null
    # ingress with a tls entry, so the tls block and the NOTES https branch render.
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml --set ingress.enabled=true --set 'ingress.tls[0].secretName=omniroute-tls' --set 'ingress.tls[0].hosts[0]=omniroute.example.com' > /dev/null
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml --set auth.existingSecret=omniroute-auth > /dev/null
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml --set persistence.enabled=false > /dev/null
    # serviceAccount.create=false exercises the serviceAccountName else-branch.
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml --set serviceAccount.create=false > /dev/null
    # extraConfig overlapping a config key must merge (extraConfig wins), not emit
    # a duplicate key. Assert the effective value rather than only that it renders.
    - helm template ./charts/omniroute -f ./charts/omniroute/ci/ct-values.yaml --set config.PORT=20128 --set extraConfig.PORT=9000 > ./template-omniroute-extra-config.yaml
    - test "$(yq e 'select(.kind == "ConfigMap") | .data.PORT' ./template-omniroute-extra-config.yaml)" = "9000"
  artifacts:
    paths:
      - ./template-omniroute.yaml

publish-omniroute-helm-dev:
  stage: build development
  image: alpine/helm:3.20.0
  interruptible: true
  rules:
    # - if: $CI_COMMIT_BRANCH != "main"
    - if: $CI_COMMIT_BRANCH != ""
      changes:
        - charts/omniroute/**/*
  before_script:
    - helm plugin install https://github.com/chartmuseum/helm-push.git --version v0.11.1
    - helm repo add --username "gitlab-ci-token" --password "${CI_JOB_TOKEN}" gitlab "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/stable"
  script:
    - |
      VERSION=$(yq e '.version' ./charts/omniroute/Chart.yaml)
      helm cm-push ./charts/omniroute --version="${VERSION}-dev-${CI_COMMIT_SHORT_SHA}" gitlab
