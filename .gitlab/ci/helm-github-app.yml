# GitHub App Jobs
test-github-app-helm:
  stage: testing
  image: alpine/helm:3.20.0
  interruptible: true
  rules:
    - changes:
        - charts/github-app/**/*
  script:
    - helm template ./charts/github-app > ./template-github-app.yaml
    # Also render the bedrock provider path to catch conditional template issues
    - helm template ./charts/github-app
        --set config.provider=bedrock
        --set config.awsRegion=us-east-1
        --set config.model=us.anthropic.claude-sonnet-4-5-v1:0
        > ./template-github-app-bedrock.yaml
    - helm lint ./charts/github-app
  artifacts:
    paths:
      - ./template-github-app.yaml

publish-github-app-helm-dev:
  stage: build development
  image: alpine/helm:3.20.0
  interruptible: true
  rules:
    # - if: $CI_COMMIT_BRANCH != "main"
    - if: $CI_COMMIT_BRANCH != ""
      changes:
        - charts/github-app/**/*
  before_script:
    - helm plugin install https://github.com/chartmuseum/helm-push.git --version v0.11.1
    - helm repo add --username "gitlab-ci-token" --password "${CI_JOB_TOKEN}" gitlab "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/stable"
  script:
    - |
      VERSION=$(yq e '.version' ./charts/github-app/Chart.yaml)
      helm cm-push ./charts/github-app --version="${VERSION}-dev-${CI_COMMIT_SHORT_SHA}" gitlab

